limit_req_zone $binary_remote_addr zone=auth_login_edge:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=auth_demo_edge:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=auth_invite_edge:10m rate=20r/m;

server {
    server_name api.jrwl.io;

    location = /auth/login {
        limit_req zone=auth_login_edge burst=10 nodelay;
        limit_req_status 429;
        error_page 429 = @auth_rate_limited;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header x-auth-rate-limit-verified "__AUTH_EDGE_RATE_LIMIT_SECRET__";
    }

    location = /auth/demo-login {
        limit_req zone=auth_demo_edge burst=10 nodelay;
        limit_req_status 429;
        error_page 429 = @auth_rate_limited;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header x-auth-rate-limit-verified "__AUTH_EDGE_RATE_LIMIT_SECRET__";
    }

    location = /auth/invitations/accept {
        limit_req zone=auth_invite_edge burst=10 nodelay;
        limit_req_status 429;
        error_page 429 = @auth_rate_limited;
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header x-auth-rate-limit-verified "__AUTH_EDGE_RATE_LIMIT_SECRET__";
    }

    location @auth_rate_limited {
        default_type application/json;
        add_header Access-Control-Allow-Origin "https://vesipolku.jrwl.io" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Cache-Control "no-store" always;
        add_header Vary "Origin" always;
        return 429 '{"message":"Too many requests","error":"Too Many Requests","statusCode":429}';
    }

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header x-auth-rate-limit-verified "";
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.jrwl.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jrwl.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name vesipolku.jrwl.io;

    root /var/www/vesipolku.jrwl.io;
    index index.html;
    include /home/deploy/saas-monorepo/infra/nginx/vesipolku.frontend-headers.conf;

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location ~ /\.(?!well-known) {
        return 404;
    }

    location ~* \.[a-z0-9]{1,8}$ {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/api.jrwl.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jrwl.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = api.jrwl.io) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name api.jrwl.io;
    return 404;
}

server {
    if ($host = vesipolku.jrwl.io) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name vesipolku.jrwl.io;
    return 404;
}
