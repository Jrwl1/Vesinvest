services:
  postgres:
    image: postgres:16
    container_name: plan20-postgres
    environment:
      POSTGRES_USER: plan20
      POSTGRES_PASSWORD: plan20
      POSTGRES_DB: plan20
    ports:
      - "5432:5432"
    volumes:
      - plan20_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plan20 -d plan20"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: plan20-minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - plan20_minio:/data

volumes:
  plan20_pgdata:
  plan20_minio:
