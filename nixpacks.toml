# Railway/Nixpacks configuration for pnpm monorepo

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@9.15.0 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter ./apps/api build"
]

[start]
cmd = "cd apps/api && pnpm start:prod"
